name: Deploy slim PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build slim static site
        shell: bash
        run: |
          mkdir -p _site/assets
          cp index.html app.js cloud-sync.js supabase-config.js styles.css overrides.css sw.js manifest.webmanifest _site/
          touch _site/.nojekyll
          cp assets/2.jpg assets/app.png assets/app-192.png assets/app-maskable.png _site/assets/
          cp assets/icon1.png assets/icon3.png assets/icon7.png assets/icon8.png _site/assets/
          cp assets/icon2.48.png assets/icon3.48.png assets/icon4.48.png _site/assets/
          cp assets/icon2.144.png assets/icon3.144.png assets/icon4.144.png _site/assets/
          cp assets/shopping-title.png assets/设置.png _site/assets/
          du -sh _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
